<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schadensverwaltung – Mockup</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .phone-frame {
    width: 390px; height: 780px;
    border-radius: 42px; background: #111827;
    padding: 12px;
    box-shadow: 0 30px 60px -15px rgba(0,0,0,0.35);
    margin: 0 auto;
  }
  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 32px; background: #f8fafc;
    overflow: hidden; display: flex; flex-direction: column;
    position: relative;
  }
  .phone-notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #111827; border-radius: 0 0 18px 18px; z-index: 30;
  }
  /* Status badges */
  .badge-neu { background: #dbeafe; color: #1e40af; }
  .badge-geprueft { background: #e0e7ff; color: #3730a3; }
  .badge-zugewiesen { background: #ede9fe; color: #5b21b6; }
  .badge-bearbeitung { background: #fef3c7; color: #92400e; }
  .badge-erledigt { background: #d1fae5; color: #065f46; }
  .badge-abgelehnt { background: #f3f4f6; color: #4b5563; }
  .badge-entwurf { background: #f3f4f6; color: #4b5563; }
  .badge-versendet { background: #cffafe; color: #155e75; }
  .badge-angenommen { background: #e0e7ff; color: #3730a3; }
  .badge-bearbeitung { background: #fef3c7; color: #92400e; }
  .badge-fertiggemeldet { background: #fed7aa; color: #9a3412; }
  .badge-abgeschlossen { background: #d1fae5; color: #065f46; }
  .prio-niedrig { background: #f1f5f9; color: #475569; }
  .prio-normal { background: #dbeafe; color: #1e40af; }
  .prio-hoch { background: #fed7aa; color: #9a3412; }
  .prio-dringend { background: #fecaca; color: #991b1b; }
  /* Map mock */
  .map-mock {
    background-image:
      linear-gradient(rgba(148,163,184,0.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,0.25) 1px, transparent 1px),
      linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
    background-size: 40px 40px, 40px 40px, 100% 100%;
    position: relative;
  }
  .map-pin {
    position: absolute; transform: translate(-50%, -100%);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }
  .role-btn { transition: all 0.15s; cursor: pointer; }
  .role-btn.active { background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); color: #1e40af; font-weight: 600; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .photo-thumb {
    background: linear-gradient(135deg, #e5e7eb, #d1d5db);
    display: flex; align-items: center; justify-content: center; color: #6b7280;
  }
  .drag-handle { cursor: grab; color: #94a3b8; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .scroll-hidden::-webkit-scrollbar { display: none; }
  .scroll-hidden { scrollbar-width: none; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">

    <button onclick="goto('#/firma/orders')" class="role-btn px-3 py-1.5 rounded-md" data-role="firma">🏗️ Firmenportal</button>

    prio:'hoch', status:'neu', created:'21.05.2026 08:14', by:'M. Huber', x:30, y:55 },

//  ROUTER
// ============================================================
function goto(hash){ location.hash = hash; }

const ROUTES = {
  // Erfasser  (Reihenfolge: Position → Kategorie → Bemerkung+Geometrie → Fotos optional)
  '#/erfasser/home':              renderErfasserHome,
  '#/erfasser/new/location':      renderErfasserNewLocation,    // Schritt 1/4
  '#/erfasser/new/category':      renderErfasserNewCategory,    // Schritt 2/4
  '#/erfasser/new/details':       renderErfasserNewDetails,     // Schritt 3/4 (mit Geometrie)

  '#/erfasser/new/done':          renderErfasserNewDone,
  '#/erfasser/list':              renderErfasserList,
  // Dispo
  '#/dispo/dashboard':            renderDispoDashboard,
  '#/dispo/damages':              renderDispoDamages,
  '#/dispo/damage/detail':        renderDispoDamageDetail,

  // Firma
  '#/firma/orders':               renderFirmaOrders,
  '#/firma/order/detail':         renderFirmaOrderDetail,
  '#/firma/position/edit':        renderFirmaPositionEdit,
  // Admin
  '#/admin/users':                renderAdminUsers,
  '#/admin/companies':            renderAdminCompanies,
  '#/admin/categories':           renderAdminCategories,
};

function route(){
  const hash = location.hash || '#/erfasser/home';
  const render = ROUTES[hash] || (()=>`<p class="p-8">404 – ${hash}</p>`);
  document.getElementById('root').innerHTML = render();
  if (window.lucide) lucide.createIcons();
  // active role
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  const role = hash.split('/')[1];
  const map = { erfasser:'erfasser', dispo:'dispo', firma:'firma', admin:'admin' };
  const btn = document.querySelector(`.role-btn[data-role="${map[role]}"]`);
  if (btn) btn.classList.add('active');
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);
window.addEventListener('load', ()=>{ route(); });

// ============================================================
//  UI BUILDING BLOCKS
// ============================================================
function statusBadge(s){
  return `<span class="badge-${s} text-xs font-medium px-2 py-0.5 rounded-full">${STATUSLABEL[s]||s}</span>`;
}
function prioBadge(p){
  return `<span class="prio-${p} text-xs font-medium px-2 py-0.5 rounded-full">${PRIOLABEL[p]||p}</span>`;
}
function orderStatusBadge(s){
  const lbl = { entwurf:'Entwurf', versendet:'Versendet', angenommen:'Angenommen',
    bearbeitung:'In Bearbeitung', fertiggemeldet:'Fertiggemeldet', abgeschlossen:'Abgeschlossen' }[s] || s;
  return `<span class="badge-${s} text-xs font-medium px-2 py-0.5 rounded-full">${lbl}</span>`;
}

function phoneWrap(inner){
  return `
    <div class="flex justify-center">
      <div class="phone-frame">
        <div class="phone-screen">
          <div class="phone-notch"></div>
          ${inner}
        </div>
      </div>
    </div>`;
}

function desktopWrap(sidebarRole, inner){
  const items = sidebarRole === 'dispo' ? [
    { hash:'#/dispo/dashboard',   icon:'layout-dashboard', label:'Dashboard' },
    { hash:'#/dispo/damages',     icon:'alert-triangle',   label:'Schäden' },
    { hash:'#/dispo/orders',      icon:'clipboard-list',   label:'Aufträge' },
    { hash:'#/dispo/order/new',   icon:'plus-circle',      label:'Neuer Auftrag' },
  ] : sidebarRole === 'admin' ? [
    { hash:'#/admin/users',       icon:'users',            label:'Nutzer' },
    { hash:'#/admin/companies',   icon:'building-2',       label:'Firmen' },
    { hash:'#/admin/categories',  icon:'list-tree',        label:'Schadenskatalog' },
  ] : [];
  const sidebarHtml = items.length ? `
    <aside class="w-56 bg-slate-900 text-slate-300 min-h-[700px] py-6 px-3 rounded-l-xl">
      <div class="text-xs uppercase tracking-wider text-slate-500 px-3 mb-3">
        ${sidebarRole === 'dispo' ? 'Disposition' : 'Administration'}
      </div>
      ${items.map(it=>`
        <a href="${it.hash}" class="flex items-center gap-2.5 px-3 py-2 rounded-md hover:bg-slate-800 ${location.hash===it.hash?'bg-slate-800 text-white':''} text-sm">
          <i data-lucide="${it.icon}" class="w-4 h-4"></i>
          ${it.label}
        </a>
      `).join('')}
      <div class="mt-6 pt-6 border-t border-slate-700 px-3 text-xs">
        <div class="text-slate-400">Angemeldet</div>
        <div class="text-white">Anna Berger</div>
        <div class="text-slate-500">${sidebarRole==='dispo'?'Disponentin':'Administrator'}</div>
      </div>
    </aside>` : '';
  return `
    <div class="max-w-[1280px] mx-auto bg-white rounded-xl shadow-sm overflow-hidden flex">
      ${sidebarHtml}
      <div class="flex-1 min-h-[700px]">
        ${inner}
      </div>
    </div>`;
}
